# Local full-stack: MongoDB + Go Game API.
#
# Run from the repo root so the build context resolves correctly:
#   docker compose -f docker/docker-compose.yml up --build
#
# The API is reachable at http://localhost:8080 (health: /health).
# PartyKit still runs separately via `npx partykit dev`.

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo-data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '8080'
      MONGODB_URI: mongodb://go-game-user:go-game-pass@mongodb:27017/go-game-db
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_REFRESH_SECRET: local-dev-jwt-refresh-secret-change-me
      PARTYKIT_WEBHOOK_SECRET: local-dev-partykit-webhook-secret
      # Web origin + the production frontend would be added here, comma-separated.
      CORS_ORIGIN: http://localhost:4200

volumes:
  mongo-data:
